<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        if (!window.crossOriginIsolated) {
          window.location.reload();
        }
      });
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブラウザ動画圧縮ツール</title>
  <style>
    :root {
      --primary-color: #007bff;
      --bg-color: #f8f9fa;
      --border-color: #dee2e6;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: #333;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
    }
    h2 {
      margin-top: 0;
      text-align: center;
      color: #212529;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    input[type="file"], input[type="number"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      box-sizing: border-box;
    }
    /* スライダーと数値入力の横並び調整 */
    .size-input-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    input[type="range"] {
      flex: 1;
      height: 8px;
      cursor: pointer;
    }
    input[type="number"].inline-size {
      width: 100px;
      text-align: right;
    }
    /* プリセットボタンのスタイル */
    .preset-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .preset-btn {
      background-color: #f1f3f5;
      color: #495057;
      border: 1px solid var(--border-color);
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset-btn:hover {
      background-color: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }
    /* ラジオボタン（圧縮モード）のスタイル */
    .mode-group {
      display: flex;
      gap: 1rem;
      background: #f1f3f5;
      padding: 0.5rem;
      border-radius: 8px;
    }
    .mode-option {
      flex: 1;
      text-align: center;
      cursor: pointer;
    }
    .mode-option input {
      display: none;
    }
    .mode-label-text {
      display: block;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      color: #495057;
      transition: background-color 0.2s, color 0.2s;
    }
    .mode-option input:checked + .mode-label-text {
      background-color: var(--primary-color);
      color: white;
    }
    button.action-btn {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 1rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 1rem;
    }
    button.action-btn:hover {
      background-color: #0056b3;
    }
    button.action-btn:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }
    #progress-container {
      display: none;
      margin-top: 1.5rem;
    }
    .progress-bar-bg {
      width: 100%;
      height: 20px;
      background-color: #e9ecef;
      border-radius: 10px;
      overflow: hidden;
    }
    #progress-bar {
      width: 0%;
      height: 100%;
      background-color: #28a745;
      transition: width 0.3s ease;
    }
    #status-text {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #6c757d;
    }
    #result-container {
      display: none;
      margin-top: 2rem;
      text-align: center;
    }
    #download-link {
      display: inline-block;
      background-color: #28a745;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-weight: bold;
    }
    #download-link:hover {
      background-color: #218838;
    }
  </style>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>

  <div class="card">
    <h2>動画圧縮ツール PRO</h2>
    
    <div class="form-group">
      <label for="video-upload">動画ファイルを選択</label>
      <input type="file" id="video-upload" accept="video/*">
    </div>

    <div class="form-group">
      <label>目標のファイルサイズ (MB)</label>
      <div class="size-input-container">
        <input type="range" id="size-slider" min="1" max="100" step="0.1" value="10">
        <input type="number" id="target-size" class="inline-size" value="10" min="1" step="0.1">
      </div>
      
      <div class="preset-container" id="preset-buttons">
        </div>
    </div>

    <div class="form-group">
      <label>圧縮モード</label>
      <div class="mode-group">
        <label class="mode-option">
          <input type="radio" name="compress-mode" value="high">
          <span class="mode-label-text">高画質</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="compress-mode" value="balance">
          <span class="mode-label-text">バランス</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="compress-mode" value="fast" checked>
          <span class="mode-label-text">ハイスピード</span>
        </label>
      </div>
    </div>

    <button id="compress-btn" class="action-btn">圧縮を開始する</button>

    <div id="progress-container">
      <div class="progress-bar-bg">
        <div id="progress-bar"></div>
      </div>
      <p id="status-text">準備中...</p>
    </div>

    <div id="result-container">
      <a id="download-link" href="#" download="compressed_video.mp4">圧縮された動画をダウンロード</a>
    </div>
  </div>

  <script>
    // --- プリセットの設定（ここを編集して簡単にボタンを追加できます） ---
    const presets = [
      { name: "Discord (10MB)", size: 10 },
      { name: "LINE (20MB)", size: 20 },
      { name: "Gmail / メール添付 (25MB)", size: 25 },
      { name: "Discord Nitro (50MB)", size: 50 }
    ];

    // FFmpegの初期化
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    // DOM要素の取得
    const uploadInput = document.getElementById('video-upload');
    const sizeSlider = document.getElementById('size-slider');
    const targetSizeInput = document.getElementById('target-size');
    const presetContainer = document.getElementById('preset-buttons');
    const compressBtn = document.getElementById('compress-btn');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');
    const resultContainer = document.getElementById('result-container');
    const downloadLink = document.getElementById('download-link');

    // --- プリセットボタンの動的生成 ---
    presets.forEach(preset => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'preset-btn';
      btn.textContent = preset.name;
      btn.addEventListener('click', () => {
        updateTargetSize(preset.size);
      });
      presetContainer.appendChild(btn);
    });

    // --- スライダーと数値入力の連動処理 ---
    function updateTargetSize(val) {
      const roundedVal = Math.max(1, parseFloat(val)).toFixed(1);
      targetSizeInput.value = roundedVal;
      sizeSlider.value = roundedVal;
    }

    sizeSlider.addEventListener('input', (e) => {
      updateTargetSize(e.target.value);
    });

    targetSizeInput.addEventListener('input', (e) => {
      let val = parseFloat(e.target.value);
      if (isNaN(val) || val < 1) {
        val = 1;
      }
      updateTargetSize(val);
    });

    // 動画の長さを取得する補助関数
    const getVideoDuration = (file) => {
      return new Promise((resolve) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.onloadedmetadata = () => {
          URL.revokeObjectURL(video.src);
          resolve(video.duration);
        };
        video.src = URL.createObjectURL(file);
      });
    };

    // 圧縮処理メイン
    compressBtn.addEventListener('click', async () => {
      const file = uploadInput.files[0];
      if (!file) {
        alert('動画ファイルを選択してください。');
        return;
      }

      const targetMB = parseFloat(targetSizeInput.value);
      const originalMB = file.size / (1024 * 1024);

      // 元動画より大きいサイズを指定した場合のブロック
      if (targetMB >= originalMB) {
        alert(`元のファイルサイズ（約${originalMB.toFixed(1)}MB）が目標サイズより小さいため、圧縮する必要はありません。`);
        return;
      }

      // UIの初期化
      compressBtn.disabled = true;
      progressContainer.style.display = 'block';
      resultContainer.style.display = 'none';
      progressBar.style.width = '0%';
      statusText.innerText = 'FFmpegエンジンを起動中...';

      try {
        if (!ffmpeg.isLoaded()) {
          await ffmpeg.load();
        }

        statusText.innerText = '動画の長さを解析中...';
        const duration = await getVideoDuration(file);

        // ビットレートの計算
        const totalBitrateKbps = (targetMB * 8192) / duration;
        const audioBitrateKbps = 128;
        let videoBitrateKbps = Math.floor(totalBitrateKbps - audioBitrateKbps);

        if (videoBitrateKbps < 100) {
          videoBitrateKbps = 100;
        }

        // --- 選択された圧縮モードに応じた設定の決定 ---
        const selectedMode = document.querySelector('input[name="compress-mode"]:checked').value;
        let presetParam = 'ultrafast'; // ハイスピード（デフォルト）
        
        if (selectedMode === 'high') {
          presetParam = 'slow'; // 高画質（時間をかけて圧縮率と画質を高める）
        } else if (selectedMode === 'balance') {
          presetParam = 'medium'; // バランス
        }

        statusText.innerText = `圧縮の準備中... [モード: ${selectedMode}] (映像: ${videoBitrateKbps}kbpsに設定)`;

        // ファイルを仮想システムに書き込み
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

        // 進捗管理
        ffmpeg.setProgress(({ ratio }) => {
          const percent = Math.min(Math.round(ratio * 100), 100);
          progressBar.style.width = `${percent}%`;
          statusText.innerText = `圧縮中... ${percent}%`;
        });

        // コマンドの組み立てと実行
        await ffmpeg.run(
          '-i', 'input.mp4', 
          '-b:v', `${videoBitrateKbps}k`, 
          '-b:a', `${audioBitrateKbps}k`, 
          '-preset', presetParam,  // モードごとのプリセットを適用
          '-threads', '4',         // マルチスレッド処理
          'output.mp4'
        );

        statusText.innerText = '圧縮完了！ファイルを生成しています...';
        
        const data = ffmpeg.FS('readFile', 'output.mp4');
        const blob = new Blob([data.buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);

        downloadLink.href = url;
        const originalName = file.name.split('.').slice(0, -1).join('.');
        downloadLink.download = `${originalName}_compressed.mp4`;
        
        resultContainer.style.display = 'block';
        statusText.innerText = '完了しました。下のボタンからダウンロードしてください。';

      } catch (error) {
        console.error('圧縮エラー:', error);
        statusText.innerText = 'エラーが発生しました。ファイルサイズが大きすぎるか、メモリ不足の可能性があります。';
      } finally {
        compressBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
